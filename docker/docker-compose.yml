version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexora-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: nexora_ag
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexora-network

  adminer:
    image: adminer:latest
    container_name: nexora-adminer
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - nexora-network

volumes:
  postgres_data:

networks:
  nexora-network:
    driver: bridge
