# ================================================================
# Nexora360 Oficinas — Nginx Virtual Hosts
# Subdomínios:
#   oficina.nexora360.cloud   → Frontend Next.js  (container: frontend:3000)
#   api-oficina.nexora360.cloud → Backend NestJS  (container: backend:3000)
#   bot.nexora360.cloud       → Admin Dashboard   (container: frontend:3000 /admin/*)
#   track.nexora360.cloud     → Tracking público  (container: frontend:3000 /tracking/*)
#
# NÃO MODIFIQUE os blocos do Salão (app/api/painel/n8n.nexora360.cloud)
# ================================================================

# ── Rate limiting zone (shared) ────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── Redirect HTTP → HTTPS (todos os subdomínios do Oficinas) ───
server {
    listen 80;
    server_name
        oficina.nexora360.cloud
        api-oficina.nexora360.cloud
        bot.nexora360.cloud
        track.nexora360.cloud;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend — oficina.nexora360.cloud ─────────────────────────
server {
    listen 443 ssl http2;
    server_name oficina.nexora360.cloud;

    ssl_certificate     /etc/letsencrypt/live/oficina.nexora360.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oficina.nexora360.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── Backend API — api-oficina.nexora360.cloud ──────────────────
server {
    listen 443 ssl http2;
    server_name api-oficina.nexora360.cloud;

    ssl_certificate     /etc/letsencrypt/live/api-oficina.nexora360.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-oficina.nexora360.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    location / {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Upload endpoint — body limit maior + timeout estendido
    location /files/upload {
        limit_req zone=api_limit burst=10 nodelay;
        client_max_body_size 10m;
        proxy_read_timeout 120s;

        proxy_pass         http://backend:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

