# ================================================================
# Nexora360 Oficinas — Nginx Virtual Hosts (HOST nginx)
# ================================================================
# Este arquivo vai em: /etc/nginx/sites-enabled/nexora-oficinas
#
# Subdomínios:
#   oficina.nexora360.cloud       → Frontend  → 127.0.0.1:3003
#   api-oficina.nexora360.cloud   → Backend   → 127.0.0.1:3002
#   bot.nexora360.cloud           → Frontend  → 127.0.0.1:3003  (admin)
#   track.nexora360.cloud         → Frontend  → 127.0.0.1:3003  (tracking)
#
# SSL: 1 certificado cobre todos os 4 domínios (SAN)
#   Path: /etc/letsencrypt/live/oficina.nexora360.cloud/
#
# NÃO TOCAR: /etc/nginx/sites-enabled/nexora360 (Salão — porta 3000/3001)
# ================================================================

# ── Rate limiting (compartilhado — http context) ───────────────
limit_req_zone $binary_remote_addr zone=oficinas_api:10m rate=30r/s;

# ── Redirect HTTP → HTTPS (todos os subdomínios do Oficinas) ───
server {
    listen 80;
    server_name
        oficina.nexora360.cloud
        api-oficina.nexora360.cloud
        bot.nexora360.cloud
        track.nexora360.cloud;

    # Certbot webroot (renovação automática)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Backend API — api-oficina.nexora360.cloud ──────────────────
server {
    listen 443 ssl http2;
    server_name api-oficina.nexora360.cloud;

    ssl_certificate     /etc/letsencrypt/live/oficina.nexora360.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oficina.nexora360.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        limit_req zone=oficinas_api burst=60 nodelay;

        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Upload de fotos — body maior e timeout estendido
    location /files/upload {
        limit_req zone=oficinas_api burst=10 nodelay;
        client_max_body_size 10m;
        proxy_read_timeout 120s;

        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Frontend — oficina.nexora360.cloud ─────────────────────────
server {
    listen 443 ssl http2;
    server_name oficina.nexora360.cloud;

    ssl_certificate     /etc/letsencrypt/live/oficina.nexora360.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oficina.nexora360.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Assets estáticos Next.js — cache imutável
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3003;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── Admin Dashboard — bot.nexora360.cloud ─────────────────────
server {
    listen 443 ssl http2;
    server_name bot.nexora360.cloud;

    ssl_certificate     /etc/letsencrypt/live/oficina.nexora360.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oficina.nexora360.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3003;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── Tracking público — track.nexora360.cloud ──────────────────
server {
    listen 443 ssl http2;
    server_name track.nexora360.cloud;

    ssl_certificate     /etc/letsencrypt/live/oficina.nexora360.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oficina.nexora360.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Assets estáticos — cache habilitado para tracking público
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3003;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3003;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }
}
